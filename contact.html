  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="Funky Rustic home">
          <img
            class="brand-mark"
            src="assets/branding/FunkyRustic_SmallBanner_NoBackground.png"
            alt="Funky Rustic logo"
          />
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="work.html">Work</a>
          <a href="about.html">About</a>
          <a href="collaborate.html">Collaborate</a>
          <a href="contact.html">Contact</a>
        </nav>
      </header>

      <main>
        <section class="page-hero">
          <p class="eyebrow">Contact</p>
          <h1>Let&apos;s make some noise.</h1>
          <p class="section-text">
            Projects, partnerships, and good ideas welcome.
          </p>
        </section>

        <section class="section">
          <div class="contact-card">
            <form class="contact-form">
              <label>
                Inquiry type
                <select>
                  <option>Sound Design</option>
                  <option>Composing or music sourcing</option>
                  <option>Voice acting or talent casting</option>
                  <option>Mentorship or career guidance</option>
                  <option>Recruiting</option>
                  <option>Fan or general message</option>
                  <option>Speaking or advisory</option>
                </select>
              </label>
              <label>
                Name
                <input type="text" placeholder="Your name" />
              </label>
              <label>
                Email
                <input type="email" placeholder="you@example.com" />
              </label>
              <label>
                What are you reaching out about?
                <textarea rows="8" placeholder="A short note, project summary, or collaboration idea."></textarea>
              </label>
              <button class="button button-primary" type="button">Send Inquiry</button>
            </form>
          </div>
        </section>
      </main>
    </div>
  </body>
