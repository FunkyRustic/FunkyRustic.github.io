<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Contact Funky Rustic about projects, partnerships, voice over, sound design, music, consulting, and creative collaboration."
    />
    <meta property="og:title" content="Contact | Funky Rustic" />
    <meta
      property="og:description"
      content="Contact Funky Rustic about projects, partnerships, voice over, sound design, music, consulting, and creative collaboration."
    />
    <meta property="og:url" content="https://felixdraconis.github.io/funkyrustic/contact.html" />
    <meta
      property="og:image"
      content="https://felixdraconis.github.io/funkyrustic/assets/branding/FunkyRustic_Montage.png"
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Contact | Funky Rustic" />
    <meta
      name="twitter:description"
      content="Contact Funky Rustic about projects, partnerships, voice over, sound design, music, consulting, and creative collaboration."
    />
    <meta
      name="twitter:image"
      content="https://felixdraconis.github.io/funkyrustic/assets/branding/FunkyRustic_Montage.png"
    />
    <link rel="icon" type="image/png" href="assets/branding/FunkyRustic_Icon.png" />
    <title>Contact | Funky Rustic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260329-2" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="index.html" aria-label="Funky Rustic home">
          <img
            class="brand-mark"
            src="assets/branding/FunkyRustic_SmallBanner_NoBackground.png"
            alt="Funky Rustic logo"
          />
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a href="work.html">Work</a>
          <a href="about.html">About</a>
          <a href="collaborate.html">Collaborate</a>
          <a href="contact.html">Contact</a>
        </nav>
      </header>

      <main>
        <section class="page-hero">
          <p class="eyebrow">Contact</p>
          <h1>Let&apos;s make some noise.</h1>
          <p class="section-text">
            Projects, partnerships, and good ideas welcome.
          </p>
        </section>

        <section class="section">
          <div class="contact-card">
            <form class="contact-form" id="contact-form" action="#" method="get">
              <label>
                Inquiry type
                <select id="contact-inquiry" name="inquiry" required>
                  <option>Sound Design</option>
                  <option>Composing or music sourcing</option>
                  <option>Voice acting or talent casting</option>
                  <option>Mentorship or career guidance</option>
                  <option>Recruiting</option>
                  <option>Fan or general message</option>
                  <option>Speaking or advisory</option>
                </select>
              </label>
              <label>
                Name
                <input
                  id="contact-name"
                  name="name"
                  type="text"
                  autocomplete="name"
                  placeholder="Your name"
                  required
                />
              </label>
              <label>
                Email
                <input
                  id="contact-email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                />
              </label>
              <label>
                What are you reaching out about?
                <textarea
                  id="contact-message"
                  name="message"
                  rows="8"
                  placeholder="A short note, project summary, or collaboration idea."
                  required
                ></textarea>
              </label>
              <button class="button button-primary" type="submit">Send Inquiry</button>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script>
      (function () {
        var TO = "abrandon@funkyrustic.net";

        function trim(s) {
          return (s || "").replace(/^\s+|\s+$/g, "");
        }

        function buildBody(inquiry, name, email, message) {
          var rule = "────────────────────────────";
          return (
            "Funky Rustic — contact form\n" +
            rule +
            "\n\n" +
            "INQUIRY TYPE\n" +
            inquiry +
            "\n\n" +
            "FROM\n" +
            "Name:  " +
            name +
            "\n" +
            "Email: " +
            email +
            "\n\n" +
            "MESSAGE\n" +
            rule +
            "\n" +
            message +
            "\n" +
            rule +
            "\n\n" +
            "— Sent from " +
            window.location.href
          );
        }

        var form = document.getElementById("contact-form");
        if (!form) return;

        form.addEventListener("submit", function (e) {
          e.preventDefault();

          if (!form.checkValidity()) {
            form.reportValidity();
            return;
          }

          var inquiry = trim(document.getElementById("contact-inquiry").value);
          var name = trim(document.getElementById("contact-name").value);
          var email = trim(document.getElementById("contact-email").value);
          var message = trim(document.getElementById("contact-message").value);

          var subject = "[Funky Rustic] " + inquiry + " — " + name;
          var body = buildBody(inquiry, name, email, message);
          var href =
            "mailto:" +
            TO +
            "?subject=" +
            encodeURIComponent(subject) +
            "&body=" +
            encodeURIComponent(body);

          window.location.href = href;
        });
      })();
    </script>
  </body>
</html>
